<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Identity Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- 顶部导航 -->
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-xl font-bold text-gray-900">Identity Center</h1>
      <div class="flex items-center gap-4">
        <span id="user-info" class="text-gray-600"></span>
        <button onclick="logout()" class="text-red-600 hover:text-red-700">退出</button>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- 未登录提示 -->
    <div id="not-logged-in" class="hidden bg-white rounded-lg shadow p-8 text-center">
      <p class="text-gray-600 mb-4">未登录或登录已过期</p>
      <a href="/login-simple.html" class="inline-block px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
        前往登录
      </a>
    </div>

    <!-- 已登录内容 -->
    <div id="logged-in" class="hidden">
      <!-- 统计卡片 -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-gray-500 text-sm">用户数</h3>
          <p id="stat-users" class="text-3xl font-bold text-indigo-600">-</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-gray-500 text-sm">应用数</h3>
          <p id="stat-apps" class="text-3xl font-bold text-green-600">-</p>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="text-gray-500 text-sm">角色数</h3>
          <p id="stat-roles" class="text-3xl font-bold text-purple-600">-</p>
        </div>
      </div>

      <!-- 快捷操作 -->
      <div class="bg-white rounded-lg shadow p-6 mb-8">
        <h2 class="text-lg font-semibold mb-4">快捷操作</h2>
        <div class="flex flex-wrap gap-4">
          <a href="/organization.html" class="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg hover:bg-indigo-200">
            组织架构管理
          </a>
          <a href="/apps.html" class="px-4 py-2 bg-green-100 text-green-700 rounded-lg hover:bg-green-200">
            应用管理
          </a>
        </div>
      </div>

      <!-- 用户列表 -->
      <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold mb-4">用户列表</h2>
        <div id="users-list" class="text-gray-500">加载中...</div>
      </div>
    </div>
  </main>

  <script>
    const API = window.location.origin;
    
    // 全局变量 - 存储当前会话
    let currentSession = {
      token: null,
      tenant: null,
      user: null
    };

    // 初始化
    async function init() {
      console.log('[DASHBOARD] 初始化');
      
      // 从 localStorage 读取
      const token = localStorage.getItem('idc_access_token');
      const tenant = localStorage.getItem('idc_tenant_id');
      const userStr = localStorage.getItem('idc_user');
      
      console.log('[DASHBOARD] Token from localStorage:', token ? token.substring(0, 20) + '...' : 'null');
      console.log('[DASHBOARD] Tenant from localStorage:', tenant);
      
      if (!token || !tenant) {
        showNotLoggedIn();
        return;
      }
      
      currentSession.token = token;
      currentSession.tenant = tenant;
      
      if (userStr) {
        try {
          currentSession.user = JSON.parse(userStr);
        } catch (e) {}
      }
      
      // 验证 token 是否有效
      const isValid = await verifyToken();
      
      if (!isValid) {
        console.log('[DASHBOARD] Token 无效，清除并显示登录');
        clearSession();
        showNotLoggedIn();
        return;
      }
      
      // Token 有效，显示内容
      showLoggedIn();
      loadData();
    }

    // 验证 token
    async function verifyToken() {
      try {
        console.log('[DASHBOARD] 验证 token...');
        const res = await fetch(`${API}/api/users?tenantId=${currentSession.tenant}`, {
          headers: {
            'Authorization': `Bearer ${currentSession.token}`,
            'X-Tenant-Id': currentSession.tenant
          }
        });
        
        console.log('[DASHBOARD] 验证结果:', res.status);
        return res.status === 200;
      } catch (err) {
        console.error('[DASHBOARD] 验证失败:', err);
        return false;
      }
    }

    // 显示未登录状态
    function showNotLoggedIn() {
      document.getElementById('not-logged-in').classList.remove('hidden');
      document.getElementById('logged-in').classList.add('hidden');
    }

    // 显示已登录状态
    function showLoggedIn() {
      document.getElementById('not-logged-in').classList.add('hidden');
      document.getElementById('logged-in').classList.remove('hidden');
      document.getElementById('user-info').textContent = currentSession.user?.username || '用户';
    }

    // 加载数据
    async function loadData() {
      try {
        // 并行加载
        const [usersRes, appsRes, rolesRes] = await Promise.all([
          fetch(`${API}/api/users?tenantId=${currentSession.tenant}`, {
            headers: {
              'Authorization': `Bearer ${currentSession.token}`,
              'X-Tenant-Id': currentSession.tenant
            }
          }),
          fetch(`${API}/api/apps?tenantId=${currentSession.tenant}`, {
            headers: {
              'Authorization': `Bearer ${currentSession.token}`
            }
          }),
          fetch(`${API}/api/roles?tenantId=${currentSession.tenant}`, {
            headers: {
              'Authorization': `Bearer ${currentSession.token}`
            }
          })
        ]);
        
        // 处理用户数据
        if (usersRes.ok) {
          const usersData = await usersRes.json();
          const users = usersData.data?.list || [];
          document.getElementById('stat-users').textContent = users.length;
          
          // 渲染用户列表
          const usersList = document.getElementById('users-list');
          if (users.length === 0) {
            usersList.innerHTML = '<p class="text-gray-500">暂无用户</p>';
          } else {
            usersList.innerHTML = users.map(u => `
              <div class="flex items-center justify-between py-2 border-b last:border-0">
                <div>
                  <span class="font-medium">${u.username}</span>
                  <span class="text-gray-500 text-sm ml-2">${u.email}</span>
                </div>
                <span class="text-xs px-2 py-1 rounded ${u.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'}">
                  ${u.status === 'active' ? '正常' : '禁用'}
                </span>
              </div>
            `).join('');
          }
        }
        
        // 处理应用数据
        if (appsRes.ok) {
          const appsData = await appsRes.json();
          const apps = appsData.data || [];
          document.getElementById('stat-apps').textContent = Array.isArray(apps) ? apps.length : 0;
        }
        
        // 处理角色数据
        if (rolesRes.ok) {
          const rolesData = await rolesRes.json();
          const roles = rolesData.data?.data || rolesData.data || [];
          document.getElementById('stat-roles').textContent = Array.isArray(roles) ? roles.length : 0;
        }
        
      } catch (err) {
        console.error('[DASHBOARD] 加载数据失败:', err);
      }
    }

    // 清除会话
    function clearSession() {
      localStorage.removeItem('idc_access_token');
      localStorage.removeItem('idc_refresh_token');
      localStorage.removeItem('idc_tenant_id');
      localStorage.removeItem('idc_user');
      currentSession = { token: null, tenant: null, user: null };
    }

    // 退出登录
    function logout() {
      clearSession();
      window.location.href = '/login-simple.html';
    }

    // 启动
    init();
  </script>
</body>
</html>
