<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - Identity Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.cn">
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-gray-100">
  <!-- 顶部导航 -->
  <nav class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
          <span class="text-xl font-bold text-gray-800">Identity Center</span>
          <span class="px-2 py-1 text-xs font-medium bg-indigo-100 text-indigo-700 rounded">管理后台</span>
        </div>
        <div class="flex items-center gap-4">
          <a href="/organization.html" class="flex items-center gap-2 px-4 py-2 text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            组织架构
          </a>
          <div class="flex items-center gap-2">
            <div id="avatar" class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-medium">U</div>
            <span id="username" class="text-sm text-gray-700">用户</span>
          </div>
          <button onclick="logout()" class="flex items-center gap-2 px-4 py-2 text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            退出
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 统计卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div class="bg-white rounded-2xl shadow-sm p-6">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </div>
          <div>
            <p class="text-sm text-gray-500">用户总数</p>
            <p id="stat-users" class="text-2xl font-bold text-gray-800">0</p>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-6">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
          </div>
          <div>
            <p class="text-sm text-gray-500">应用总数</p>
            <p id="stat-apps" class="text-2xl font-bold text-gray-800">0</p>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-6">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-green-50 text-green-600 flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
          </div>
          <div>
            <p class="text-sm text-gray-500">活跃会话</p>
            <p id="stat-sessions" class="text-2xl font-bold text-gray-800">0</p>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-6">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-orange-50 text-orange-600 flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <div>
            <p class="text-sm text-gray-500">今日活跃</p>
            <p id="stat-today" class="text-2xl font-bold text-gray-800">0</p>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- 应用列表 -->
      <div class="bg-white rounded-2xl shadow-sm">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
          <h3 class="text-lg font-semibold text-gray-800">应用列表</h3>
          <button onclick="showAppModal()" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            创建应用
          </button>
        </div>
        <div id="apps-list" class="p-6">
          <div class="text-center py-8 text-gray-500">
            <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            加载中...
          </div>
        </div>
      </div>

      <!-- 用户列表 -->
      <div class="bg-white rounded-2xl shadow-sm">
        <div class="p-6 border-b border-gray-100">
          <h3 class="text-lg font-semibold text-gray-800">用户列表</h3>
        </div>
        <div id="users-list" class="p-6">
          <div class="text-center py-8 text-gray-500">
            <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            加载中...
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 创建应用模态框 -->
  <div id="app-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-md animate-fade-in">
      <div class="p-6 border-b border-gray-100 flex justify-between items-center">
        <h3 class="text-lg font-semibold text-gray-800">创建应用</h3>
        <button onclick="hideAppModal()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="app-form" class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">应用名称</label>
          <input type="text" id="app-name" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="我的应用">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">回调地址</label>
          <textarea id="app-uris" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none resize-none" placeholder="https://my-app.com/callback" rows="3"></textarea>
          <p class="mt-1.5 text-xs text-gray-400">每行一个回调地址</p>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="hideAppModal()" class="flex-1 py-3 border border-gray-200 text-gray-700 font-medium rounded-xl hover:bg-gray-50 transition-colors">
            取消
          </button>
          <button type="submit" id="app-btn" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors">
            创建
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const STORAGE_KEYS = { token: 'idc_access_token', tenant: 'idc_tenant_id', user: 'idc_user' };

    let apps = [];
    let users = [];

    // 处理 401 错误 - 显示提示，不自动跳转
    function handleAuthError(response) {
      if (response.status === 401) {
        // 显示错误提示，但不自动跳转
        const errorDiv = document.getElementById('auth-error') || document.createElement('div');
        errorDiv.id = 'auth-error';
        errorDiv.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
        errorDiv.innerHTML = `
          <span>登录已过期，请</span>
          <a href="/login.html" class="underline ml-1">重新登录</a>
          <button onclick="this.parentElement.remove()" class="ml-4 text-red-200 hover:text-white">×</button>
        `;
        if (!document.getElementById('auth-error')) {
          document.body.appendChild(errorDiv);
        }
        // 不再自动跳转，让用户自己决定
        return true;
      }
      return false;
    }

    function getHeaders() {
      const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem(STORAGE_KEYS.token)}`,
      };
      // 只有 tenant 有效时才添加 header
      if (tenant && tenant !== 'null' && tenant !== 'undefined') {
        headers['x-tenant-id'] = tenant;
      }
      return headers;
    }

    async function init() {
      // 检查登录
      const token = localStorage.getItem(STORAGE_KEYS.token);
      console.log('[DASHBOARD] token:', token ? token.substring(0, 20) + '...' : 'null');
      
      if (!token) {
        console.log('[DASHBOARD] 没有 token，跳转登录');
        window.location.href = '/login.html';
        return;
      }

      // 显示用户信息
      const user = JSON.parse(localStorage.getItem(STORAGE_KEYS.user) || '{}');
      console.log('[DASHBOARD] user:', user.username);
      console.log('[DASHBOARD] tenant:', localStorage.getItem(STORAGE_KEYS.tenant));
      
      if (!user || !user.username) {
        console.log('[DASHBOARD] 用户信息无效，跳转登录');
        localStorage.clear();
        window.location.href = '/login.html';
        return;
      }
      
      document.getElementById('username').textContent = user.username || '用户';
      document.getElementById('avatar').textContent = (user.username || 'U')[0].toUpperCase();

      // 加载数据（即使失败也不跳转，只显示错误）
      try {
        await Promise.all([loadApps(), loadUsers()]);
      } catch (err) {
        console.error('[DASHBOARD] 加载数据失败', err);
        // 不跳转，只显示错误信息
      }
    }

    async function loadApps() {
      try {
        console.log('[DEBUG] loadApps called');
        const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
        const headers = getHeaders();
        console.log('[DEBUG] tenant:', tenant);
        console.log('[DEBUG] headers:', { ...headers, Authorization: headers.Authorization?.substring(0, 30) + '...' });
        
        const url = tenant ? `${API}/api/apps?tenantId=${tenant}` : `${API}/api/apps`;
        const res = await fetch(url, { headers });
        if (handleAuthError(res)) return;
        console.log('[DEBUG] response status:', res.status);
        const data = await res.json();
        console.log('[DEBUG] response data:', data);
        // 处理 TransformInterceptor 包装的响应格式：data.data 是数组
        apps = Array.isArray(data.data) ? data.data : (data.data?.apps || []);
        console.log('[DEBUG] parsed apps:', apps);
        document.getElementById('stat-apps').textContent = apps.length;
        renderApps();
      } catch (err) {
        console.error('[ERROR] 加载应用失败', err);
      }
    }

    async function loadUsers() {
      try {
        console.log('[DEBUG] loadUsers called');
        const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
        const headers = getHeaders();
        
        const url = tenant ? `${API}/api/users?tenantId=${tenant}` : `${API}/api/users`;
        const res = await fetch(url, { headers });
        if (handleAuthError(res)) return;
        console.log('[DEBUG] response status:', res.status);
        const data = await res.json();
        console.log('[DEBUG] response data:', data);
        // 处理 TransformInterceptor 包装的响应格式
        users = data.data?.list || data.data || [];
        console.log('[DEBUG] parsed users:', users);
        document.getElementById('stat-users').textContent = users.length;
        renderUsers();
      } catch (err) {
        console.error('[ERROR] 加载用户失败', err);
      }
    }

    function renderApps() {
      const container = document.getElementById('apps-list');
      if (apps.length === 0) {
        container.innerHTML = `
          <div class="text-center py-8 text-gray-500">
            <svg class="w-12 h-12 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
            </svg>
            <p>暂无应用</p>
            <button onclick="showAppModal()" class="mt-4 text-indigo-600 hover:text-indigo-700 font-medium">创建第一个应用</button>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="space-y-4">
          ${apps.map(app => {
            // 兼容 clientId 和 client_id 两种格式
            const clientId = app.clientId || app.client_id;
            return `
            <div class="p-4 border border-gray-200 rounded-xl hover:border-indigo-200 transition-colors">
              <div class="flex justify-between items-start">
                <div>
                  <h4 class="font-semibold text-gray-800">${app.name}</h4>
                  <p class="text-sm text-gray-500 mt-1">Client ID: ${clientId || '-'}</p>
                </div>
                <div class="flex gap-2">
                  ${clientId ? `
                  <button onclick="copyToClipboard('${clientId}')" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="复制 Client ID">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                  </button>
                  ` : ''}
                </div>
              </div>
              <div class="mt-3 flex flex-wrap gap-2">
                ${(app.redirectUris || app.redirect_uris || []).map(uri => `<span class="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded">${uri}</span>`).join('')}
              </div>
            </div>
          `}).join('')}
        </div>
      `;
    }

    function renderUsers() {
      const container = document.getElementById('users-list');
      if (users.length === 0) {
        container.innerHTML = `
          <div class="text-center py-8 text-gray-500">
            <p>暂无用户</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="space-y-3">
          ${users.map(user => `
            <div class="flex items-center gap-3 p-3 hover:bg-gray-50 rounded-lg transition-colors">
              <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-medium">
                ${(user.username || 'U')[0].toUpperCase()}
              </div>
              <div class="flex-1">
                <p class="font-medium text-gray-800">${user.username}</p>
                <p class="text-sm text-gray-500">${user.email || '-'}</p>
              </div>
              <span class="px-2 py-1 text-xs font-medium rounded ${user.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'}">
                ${user.role === 'admin' ? '管理员' : '用户'}
              </span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function showAppModal() {
      document.getElementById('app-modal').classList.remove('hidden');
    }

    function hideAppModal() {
      document.getElementById('app-modal').classList.add('hidden');
      document.getElementById('app-form').reset();
    }

    function copyClientSecret(id) {
      navigator.clipboard.writeText(id);
      alert('已复制到剪贴板');
    }

    document.getElementById('app-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('app-btn');
      btn.disabled = true;
      btn.textContent = '创建中...';

      try {
        const name = document.getElementById('app-name').value;
        const uris = document.getElementById('app-uris').value.split('\n').map(u => u.trim()).filter(Boolean);

        const res = await fetch(`${API}/api/apps`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({ name, redirectUris: uris }),
        });
        const data = await res.json();

        if (data.success && data.data?.app) {
          apps.push(data.data.app);
          document.getElementById('stat-apps').textContent = apps.length;
          renderApps();
          hideAppModal();
        } else if (data.app) {
          // 直接返回 app 的情况
          apps.push(data.app);
          document.getElementById('stat-apps').textContent = apps.length;
          renderApps();
          hideAppModal();
        } else {
          alert(data.message || data.data?.message || '创建失败');
        }
      } catch (err) {
        alert('创建失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '创建';
      }
    });

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('已复制到剪贴板');
      }).catch(() => {
        // 降级方案
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('已复制到剪贴板');
      });
    }

    function logout() {
      Object.values(STORAGE_KEYS).forEach(k => localStorage.removeItem(k));
      window.location.href = '/login.html';
    }

    init();
  </script>
</body>
</html>
