<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组织架构管理 - Identity Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .tree-node { padding-left: 20px; }
    .tree-node::before { content: '├─ '; color: #9ca3af; }
    .tree-node:first-child::before { content: '└─ '; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- 顶部导航 -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-indigo-600">Identity Center</h1>
          <span class="ml-4 text-gray-500">/ 组织架构管理</span>
        </div>
        <div class="flex items-center space-x-4">
          <span id="user-info" class="text-gray-600"></span>
          <a href="/dashboard.html" class="text-indigo-600 hover:text-indigo-800">
            <i class="fas fa-home mr-1"></i>返回首页
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 标签切换 -->
    <div class="flex space-x-4 mb-6">
      <button id="tab-departments" onclick="switchTab('departments')" class="px-4 py-2 rounded-lg font-medium transition-all bg-indigo-600 text-white">
        <i class="fas fa-building mr-2"></i>部门管理
      </button>
      <button id="tab-roles" onclick="switchTab('roles')" class="px-4 py-2 rounded-lg font-medium transition-all bg-white text-gray-600 hover:bg-gray-50">
        <i class="fas fa-user-shield mr-2"></i>角色管理
      </button>
      <button id="tab-users" onclick="switchTab('users')" class="px-4 py-2 rounded-lg font-medium transition-all bg-white text-gray-600 hover:bg-gray-50">
        <i class="fas fa-users mr-2"></i>用户管理
      </button>
    </div>

    <!-- 部门管理 -->
    <div id="panel-departments" class="bg-white rounded-xl shadow-sm p-6 fade-in">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold text-gray-800">部门列表</h2>
        <button onclick="showDepartmentModal()" class="btn btn-primary btn-sm">
          <i class="fas fa-plus mr-1"></i>添加部门
        </button>
      </div>
      <div id="department-tree" class="space-y-1"></div>
    </div>

    <!-- 角色管理 -->
    <div id="panel-roles" class="bg-white rounded-xl shadow-sm p-6 hidden fade-in">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold text-gray-800">角色列表</h2>
        <button onclick="showRoleModal()" class="btn btn-primary btn-sm">
          <i class="fas fa-plus mr-1"></i>添加角色
        </button>
      </div>
      <div id="role-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <!-- 用户管理 -->
    <div id="panel-users" class="bg-white rounded-xl shadow-sm p-6 hidden fade-in">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold text-gray-800">用户列表</h2>
        <button onclick="showUserRoleModal()" class="btn btn-primary btn-sm">
          <i class="fas fa-user-cog mr-1"></i>分配角色
        </button>
      </div>
      <div id="user-list" class="overflow-x-auto">
        <table class="table w-full">
          <thead>
            <tr class="bg-gray-50">
              <th>用户名</th>
              <th>邮箱</th>
              <th>部门</th>
              <th>角色</th>
              <th>状态</th>
              <th>创建时间</th>
            </tr>
          </thead>
          <tbody id="user-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 部门弹窗 -->
  <dialog id="department-modal" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg" id="department-modal-title">添加部门</h3>
      <form id="department-form" onsubmit="saveDepartment(event)">
        <input type="hidden" id="department-id">
        <div class="form-control mt-4">
          <label class="label"><span class="label-text">部门名称 *</span></label>
          <input type="text" id="department-name" class="input input-bordered" required>
        </div>
        <div class="form-control mt-2">
          <label class="label"><span class="label-text">部门编码</span></label>
          <input type="text" id="department-code" class="input input-bordered">
        </div>
        <div class="form-control mt-2">
          <label class="label"><span class="label-text">上级部门</span></label>
          <select id="department-parent" class="select select-bordered">
            <option value="">无（顶级部门）</option>
          </select>
        </div>
        <div class="form-control mt-2">
          <label class="label"><span class="label-text">排序</span></label>
          <input type="number" id="department-sort" class="input input-bordered" value="0">
        </div>
        <div class="modal-action">
          <button type="button" class="btn" onclick="document.getElementById('department-modal').close()">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- 角色弹窗 -->
  <dialog id="role-modal" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg" id="role-modal-title">添加角色</h3>
      <form id="role-form" onsubmit="saveRole(event)">
        <input type="hidden" id="role-id">
        <div class="form-control mt-4">
          <label class="label"><span class="label-text">角色名称 *</span></label>
          <input type="text" id="role-name" class="input input-bordered" required>
        </div>
        <div class="form-control mt-2">
          <label class="label"><span class="label-text">角色编码 *</span></label>
          <input type="text" id="role-code" class="input input-bordered" required>
        </div>
        <div class="form-control mt-2">
          <label class="label"><span class="label-text">描述</span></label>
          <textarea id="role-description" class="textarea textarea-bordered"></textarea>
        </div>
        <div class="modal-action">
          <button type="button" class="btn" onclick="document.getElementById('role-modal').close()">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- 用户角色分配弹窗 -->
  <dialog id="user-role-modal" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg">分配角色</h3>
      <input type="hidden" id="role-user-id">
      <div class="form-control mt-4">
        <label class="label"><span class="label-text">用户名</span></label>
        <span id="role-user-name" class="text-lg font-medium"></span>
      </div>
      <div class="form-control mt-4">
        <label class="label"><span class="label-text">选择角色</span></label>
        <div id="role-checkboxes" class="space-y-2"></div>
      </div>
      <div class="modal-action">
        <button type="button" class="btn" onclick="document.getElementById('user-role-modal').close()">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveUserRoles()">保存</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <script>
    const API = window.location.origin;
    const STORAGE_KEYS = {
      token: 'idc_access_token',
      refresh: 'idc_refresh_token',
      user: 'idc_user',
      tenant: 'idc_tenant_id'
    };

    let currentTab = 'departments';
    let departments = [];
    let roles = [];
    let users = [];

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadDepartments();
      loadRoles();
      loadUsers();
    });

    function getHeaders() {
      const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem(STORAGE_KEYS.token)}`
      };
      // 只有 tenant 有效时才添加
      if (tenant && tenant !== 'null' && tenant !== 'undefined') {
        headers['x-tenant-id'] = tenant;
      }
      return headers;
    }

    // 处理 401 错误 - 显示提示，不自动跳转
    function handleAuthError(response) {
      if (response.status === 401) {
        const errorDiv = document.getElementById('auth-error') || document.createElement('div');
        errorDiv.id = 'auth-error';
        errorDiv.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
        errorDiv.innerHTML = `
          <span>登录已过期，请</span>
          <a href="/login.html" class="underline ml-1">重新登录</a>
          <button onclick="this.parentElement.remove()" class="ml-4 text-red-200 hover:text-white">×</button>
        `;
        if (!document.getElementById('auth-error')) {
          document.body.appendChild(errorDiv);
        }
        return true;
      }
      return false;
    }

    function checkAuth() {
      const token = localStorage.getItem(STORAGE_KEYS.token);
      const user = JSON.parse(localStorage.getItem(STORAGE_KEYS.user) || '{}');
      console.log('[ORG] token:', token ? token.substring(0, 20) + '...' : 'null');
      console.log('[ORG] user:', user.username);
      console.log('[ORG] tenant:', localStorage.getItem(STORAGE_KEYS.tenant));
      
      if (!token || !user || !user.id) {
        console.log('[ORG] 认证失败，显示错误');
        // 显示错误提示，而不是直接跳转
        const errorDiv = document.createElement('div');
        errorDiv.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
        errorDiv.innerHTML = `
          <span>未登录，请</span>
          <a href="/login.html" class="underline ml-1">前往登录</a>
        `;
        document.body.appendChild(errorDiv);
        return;
      }
      document.getElementById('user-info').textContent = user.username || user.email;
    }

    // 标签切换
    function switchTab(tab) {
      currentTab = tab;
      ['departments', 'roles', 'users'].forEach(t => {
        const tabEl = document.getElementById(`tab-${t}`);
        const panelEl = document.getElementById(`panel-${t}`);
        if (t === tab) {
          tabEl.classList.add('bg-indigo-600', 'text-white');
          tabEl.classList.remove('bg-white', 'text-gray-600');
          panelEl.classList.remove('hidden');
        } else {
          tabEl.classList.remove('bg-indigo-600', 'text-white');
          tabEl.classList.add('bg-white', 'text-gray-600');
          panelEl.classList.add('hidden');
        }
      });
    }

    // 部门管理
    async function loadDepartments() {
      try {
        const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
        const res = await fetch(`${API}/api/departments?tenantId=${tenant}`, { headers: getHeaders() });
        if (handleAuthError(res)) return;
        const data = await res.json();
        if (data.success) {
          departments = flattenTree(data.data?.data || data.data || []);
          renderDepartmentTree(data.data?.data || data.data || []);
          populateDepartmentSelect(data.data?.data || data.data || []);
        }
      } catch (err) {
        console.error('加载部门失败', err);
      }
    }

    function flattenTree(nodes, result = []) {
      nodes.forEach(node => {
        result.push(node);
        if (node.children && node.children.length > 0) {
          flattenTree(node.children, result);
        }
      });
      return result;
    }

    function renderDepartmentTree(nodes, level = 0) {
      const container = document.getElementById('department-tree');
      if (level === 0) container.innerHTML = '';

      nodes.forEach(node => {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between p-3 hover:bg-gray-50 rounded-lg transition-all';
        div.style.marginLeft = `${level * 20}px`;
        div.innerHTML = `
          <div class="flex items-center">
            <i class="fas fa-building text-indigo-500 mr-3"></i>
            <div>
              <div class="font-medium text-gray-800">${node.name}</div>
              <div class="text-sm text-gray-500">${node.code || ''}</div>
            </div>
          </div>
          <div class="flex items-center space-x-2">
            <button onclick="editDepartment('${node.id}')" class="btn btn-ghost btn-sm text-gray-500 hover:text-indigo-600">
              <i class="fas fa-edit"></i>
            </button>
            <button onclick="deleteDepartment('${node.id}')" class="btn btn-ghost btn-sm text-gray-500 hover:text-red-500">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        `;
        container.appendChild(div);
        if (node.children && node.children.length > 0) {
          renderDepartmentTree(node.children, level + 1);
        }
      });
    }

    function populateDepartmentSelect(nodes, options = [], level = 0) {
      nodes.forEach(node => {
        options.push({ id: node.id, name: '  '.repeat(level) + node.name });
        if (node.children && node.children.length > 0) {
          populateDepartmentSelect(node.children, options, level + 1);
        }
      });
      return options;
    }

    function showDepartmentModal(id = null) {
      const modal = document.getElementById('department-modal');
      const form = document.getElementById('department-form');
      form.reset();
      document.getElementById('department-id').value = '';

      // 填充上级部门选项
      const select = document.getElementById('department-parent');
      select.innerHTML = '<option value="">无（顶级部门）</option>';
      const options = [{ id: '', name: '无（顶级部门）' }];
      populateDepartmentSelect(departments, options, 0).forEach(opt => {
        select.innerHTML += `<option value="${opt.id}">${opt.name}</option>`;
      });

      if (id) {
        document.getElementById('department-modal-title').textContent = '编辑部门';
        const dept = departments.find(d => d.id === id);
        if (dept) {
          document.getElementById('department-id').value = dept.id;
          document.getElementById('department-name').value = dept.name;
          document.getElementById('department-code').value = dept.code || '';
          document.getElementById('department-parent').value = dept.parent_id || '';
          document.getElementById('department-sort').value = dept.sort_order || 0;
        }
      } else {
        document.getElementById('department-modal-title').textContent = '添加部门';
      }

      modal.showModal();
    }

    function editDepartment(id) {
      showDepartmentModal(id);
    }

    async function saveDepartment(e) {
      e.preventDefault();
      const id = document.getElementById('department-id').value;
      const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
      const data = {
        name: document.getElementById('department-name').value,
        code: document.getElementById('department-code').value,
        parentId: document.getElementById('department-parent').value || null,
        sortOrder: parseInt(document.getElementById('department-sort').value) || 0
      };

      try {
        const url = id ? `${API}/api/departments/${id}?tenantId=${tenant}` : `${API}/api/departments?tenantId=${tenant}`;
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: getHeaders(),
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          document.getElementById('department-modal').close();
          loadDepartments();
          showToast(id ? '部门更新成功' : '部门创建成功');
        } else {
          showToast(result.error || '操作失败', 'error');
        }
      } catch (err) {
        showToast('操作失败', 'error');
      }
    }

    async function deleteDepartment(id) {
      if (!confirm('确定要删除该部门吗？')) return;
      const tenant = localStorage.getItem(STORAGE_KEYS.tenant);

      try {
        const res = await fetch(`${API}/api/departments/${id}?tenantId=${tenant}`, {
          method: 'DELETE',
          headers: getHeaders()
        });
        const result = await res.json();
        if (result.success) {
          loadDepartments();
          showToast('删除成功');
        } else {
          showToast(result.error || '删除失败', 'error');
        }
      } catch (err) {
        showToast('删除失败', 'error');
      }
    }

    // 角色管理
    async function loadRoles() {
      try {
        const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
        const res = await fetch(`${API}/api/roles?tenantId=${tenant}`, { headers: getHeaders() });
        if (handleAuthError(res)) return;
        const data = await res.json();
        if (data.success) {
          roles = data.data?.data || data.data || [];
          renderRoles();
        }
      } catch (err) {
        console.error('加载角色失败', err);
      }
    }

    function renderRoles() {
      const container = document.getElementById('role-list');
      container.innerHTML = roles.map(role => `
        <div class="card bg-base-100 border border-gray-200">
          <div class="card-body p-4">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="font-semibold text-gray-800">${role.name}</h3>
                <p class="text-sm text-gray-500 font-mono">${role.code}</p>
              </div>
              <div class="badge ${role.code === 'admin' ? 'badge-error' : role.code === 'manager' ? 'badge-warning' : 'badge-info'}">
                ${role.code}
              </div>
            </div>
            <p class="text-sm text-gray-600 mt-2">${role.description || '暂无描述'}</p>
            <div class="card-actions justify-end mt-4">
              <button onclick="editRole('${role.id}')" class="btn btn-ghost btn-sm">
                <i class="fas fa-edit mr-1"></i>编辑
              </button>
              ${role.code !== 'admin' ? `
              <button onclick="deleteRole('${role.id}')" class="btn btn-ghost btn-sm text-red-500">
                <i class="fas fa-trash mr-1"></i>删除
              </button>
              ` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function showRoleModal(id = null) {
      const modal = document.getElementById('role-modal');
      const form = document.getElementById('role-form');
      form.reset();
      document.getElementById('role-id').value = '';

      if (id) {
        document.getElementById('role-modal-title').textContent = '编辑角色';
        const role = roles.find(r => r.id === id);
        if (role) {
          document.getElementById('role-id').value = role.id;
          document.getElementById('role-name').value = role.name;
          document.getElementById('role-code').value = role.code;
          document.getElementById('role-description').value = role.description || '';
        }
      } else {
        document.getElementById('role-modal-title').textContent = '添加角色';
      }

      modal.showModal();
    }

    function editRole(id) {
      showRoleModal(id);
    }

    async function saveRole(e) {
      e.preventDefault();
      const id = document.getElementById('role-id').value;
      const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
      const data = {
        name: document.getElementById('role-name').value,
        code: document.getElementById('role-code').value,
        description: document.getElementById('role-description').value
      };

      try {
        const url = id ? `${API}/api/roles/${id}?tenantId=${tenant}` : `${API}/api/roles?tenantId=${tenant}`;
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: getHeaders(),
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          document.getElementById('role-modal').close();
          loadRoles();
          showToast(id ? '角色更新成功' : '角色创建成功');
        } else {
          showToast(result.error || '操作失败', 'error');
        }
      } catch (err) {
        showToast('操作失败', 'error');
      }
    }

    async function deleteRole(id) {
      if (!confirm('确定要删除该角色吗？')) return;
      const tenant = localStorage.getItem(STORAGE_KEYS.tenant);

      try {
        const res = await fetch(`${API}/api/roles/${id}?tenantId=${tenant}`, {
          method: 'DELETE',
          headers: getHeaders()
        });
        const result = await res.json();
        if (result.success) {
          loadRoles();
          showToast('删除成功');
        } else {
          showToast(result.error || '删除失败', 'error');
        }
      } catch (err) {
        showToast('删除失败', 'error');
      }
    }

    // 用户管理
    async function loadUsers() {
      try {
        const tenant = localStorage.getItem(STORAGE_KEYS.tenant);
        const res = await fetch(`${API}/api/users?tenantId=${tenant}`, { headers: getHeaders() });
        if (handleAuthError(res)) return;
        const data = await res.json();
        if (data.success) {
          users = data.data?.list || data.data || [];
          renderUsers();
        }
      } catch (err) {
        console.error('加载用户失败', err);
      }
    }

    function renderUsers() {
      const tbody = document.getElementById('user-table-body');

      tbody.innerHTML = users.map(user => {
        // 使用后端直接返回的角色数据
        const userRoles = user.roles || [];
        const roleBadges = userRoles.map(r =>
          `<span class="badge badge-sm ${r.code === 'admin' ? 'badge-error' : 'badge-info'}">${r.name}</span>`
        ).join('') || user.roleNames || '';

        return `
          <tr>
            <td>${user.username}</td>
            <td>${user.email}</td>
            <td>${user.department_name || '-'}</td>
            <td>${roleBadges || '<span class="text-gray-400">无</span>'}</td>
            <td><span class="badge ${user.status === 'active' ? 'badge-success' : 'badge-error'}">${user.status === 'active' ? '正常' : '禁用'}</span></td>
            <td>${new Date(user.created_at).toLocaleDateString()}</td>
          </tr>
        `;
      }).join('');
    }

    function showUserRoleModal() {
      if (users.length === 0) {
        showToast('暂无用户', 'error');
        return;
      }

      // 选择用户
      const userOptions = users.map(u => `<option value="${u.id}">${u.username} (${u.email})</option>`).join('');
      const userSelectHtml = `
        <div class="form-control mt-4">
          <label class="label"><span class="label-text">选择用户 *</span></label>
          <select id="select-user-for-role" class="select select-bordered" onchange="loadUserRoles(this.value)">
            <option value="">-- 选择用户 --</option>
            ${userOptions}
          </select>
        </div>
      `;

      const modal = document.getElementById('user-role-modal');
      modal.querySelector('.modal-box').innerHTML = `
        <h3 class="font-bold text-lg">分配角色</h3>
        ${userSelectHtml}
        <div class="form-control mt-4">
          <label class="label"><span class="label-text">选择角色</span></label>
          <div id="role-checkboxes" class="space-y-2">
            <p class="text-gray-500">请先选择用户</p>
          </div>
        </div>
        <div class="modal-action">
          <button type="button" class="btn" onclick="user-role-modal.close()">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveUserRoles()">保存</button>
        </div>
      `;

      modal.showModal();
    }

    async function loadUserRoles(userId) {
      const container = document.getElementById('role-checkboxes');
      if (!userId) {
        container.innerHTML = '<p class="text-gray-500">请先选择用户</p>';
        return;
      }

      // 获取用户当前角色
      let currentRoleIds = [];
      try {
        const res = await fetch(`${API}/api/roles/user/${userId}`, { headers: getHeaders() });
        const data = await res.json();
        currentRoleIds = (data.data || []).map(r => r.id);
      } catch {}

      // 渲染角色选项
      container.innerHTML = roles.map(role => `
        <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer">
          <input type="checkbox" class="checkbox checkbox-primary" value="${role.id}" ${currentRoleIds.includes(role.id) ? 'checked' : ''}>
          <span class="font-medium">${role.name}</span>
          <span class="text-gray-500 text-sm">(${role.code})</span>
        </label>
      `).join('');
    }

    async function saveUserRoles() {
      const userId = document.getElementById('select-user-for-role')?.value;
      if (!userId) {
        showToast('请选择用户', 'error');
        return;
      }

      const checkboxes = document.querySelectorAll('#role-checkboxes input[type="checkbox"]:checked');
      const roleIds = Array.from(checkboxes).map(cb => cb.value);

      try {
        const res = await fetch(`${API}/api/roles/assign`, {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({ userId, roleIds })
        });
        const result = await res.json();
        if (result.success) {
          document.getElementById('user-role-modal').close();
          loadUsers();
          showToast('角色分配成功');
        } else {
          showToast(result.error || '操作失败', 'error');
        }
      } catch (err) {
        showToast('操作失败', 'error');
      }
    }

    // 提示信息
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-top toast-center`;
      toast.innerHTML = `
        <div class="alert ${type === 'success' ? 'alert-success' : 'alert-error'}">
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
