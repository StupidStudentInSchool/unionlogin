<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identity Center - 统一身份认证中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.cn">
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-gray-50">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full animate-fade-in">
      <div class="text-center mb-8">
        <div class="w-20 h-20 bg-gradient-to-br from-indigo-600 via-purple-600 to-indigo-800 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Identity Center</h1>
        <p class="text-gray-500">统一身份认证中心</p>
      </div>

      <div class="bg-white rounded-2xl shadow-lg p-8">
        <div class="text-center">
          <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p class="text-gray-600">正在检查系统状态...</p>
        </div>
      </div>

      <p class="text-center text-sm text-gray-400 mt-6">
        © 2024 Identity Center
      </p>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const STORAGE_KEYS = { token: 'idc_access_token' };

    async function init() {
      // 检查是否已登录
      if (localStorage.getItem(STORAGE_KEYS.token)) {
        window.location.href = '/dashboard.html';
        return;
      }

      // 检查是否有管理员账号
      try {
        const res = await fetch(`${API_BASE}/api/tenants`);
        const data = await res.json();

        if (data.tenants && data.tenants.length > 0) {
          window.location.href = '/login.html';
        } else {
          window.location.href = '/setup.html';
        }
      } catch {
        window.location.href = '/login.html';
      }
    }

    setTimeout(init, 1000);
  </script>
</body>
</html>
