<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Identity Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.cn">
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- 左侧品牌 -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-indigo-600 via-purple-600 to-indigo-800 p-12 flex-col justify-between">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <span class="text-2xl font-bold text-white">Identity Center</span>
    </div>
    <div class="space-y-6">
      <h1 class="text-5xl font-bold text-white leading-tight">欢迎回来</h1>
      <p class="text-xl text-white/80 leading-relaxed">使用统一身份认证中心安全登录您的账户</p>
    </div>
    <div class="text-white/60 text-sm">© 2024 Identity Center</div>
  </div>

  <!-- 右侧登录表单 -->
  <div class="flex-1 flex items-center justify-center p-8 bg-gray-50">
    <div class="w-full max-w-md">
      <!-- 移动端 Logo -->
      <div class="lg:hidden flex items-center justify-center gap-3 mb-8">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <span class="text-xl font-bold text-gray-800">Identity Center</span>
      </div>

      <div class="bg-white rounded-2xl shadow-lg p-8 animate-fade-in">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">登录</h2>
        <p class="text-gray-500 mb-6">输入您的账户信息</p>
        <div id="error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"></div>
        <form id="form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">租户</label>
            <select id="tenant" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none bg-white">
              <option value="">选择租户</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">用户名或邮箱</label>
            <input type="text" id="username" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="输入用户名或邮箱">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
            <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="输入密码">
          </div>
          <button type="submit" id="btn" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors">
            登录
          </button>
        </form>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-400">或</span>
          </div>
        </div>

        <div class="space-y-3">
          <button onclick="oauth('github')" class="w-full py-3 bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-xl transition-colors flex items-center justify-center gap-3">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            使用 GitHub 登录
          </button>
          <button onclick="oauth('google')" class="w-full py-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-medium rounded-xl transition-colors flex items-center justify-center gap-3">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            使用 Google 登录
          </button>
        </div>

        <p class="mt-6 text-center text-sm text-gray-500">
          还没有账户?
          <a id="registerLink" href="/register.html" class="text-indigo-600 hover:text-indigo-700 font-medium ml-1">立即注册</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const STORAGE_KEYS = { token: 'idc_access_token', refresh: 'idc_refresh_token', tenant: 'idc_tenant_id', user: 'idc_user' };

    // 获取URL参数（用于OAuth流程）
    const urlParams = new URLSearchParams(window.location.search);
    const redirectUri = urlParams.get('redirect_uri');
    const clientId = urlParams.get('client_id');
    const state = urlParams.get('state');
    const scope = urlParams.get('scope');
    const registered = urlParams.get('registered');

    // 如果是注册成功后跳转来的，显示提示
    if (registered === '1') {
      document.getElementById('error').textContent = '注册成功，请登录';
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('error').className = 'mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-600 text-sm';
    }

    // 更新注册链接，传递OAuth参数
    if (clientId && redirectUri) {
      const registerLink = document.getElementById('registerLink');
      const registerParams = new URLSearchParams({
        client_id: clientId,
        redirect_uri: redirectUri
      });
      if (state) registerParams.set('state', state);
      registerLink.href = `/register.html?${registerParams.toString()}`;
    }

    async function loadTenants() {
      const res = await fetch(`${API}/api/tenants`);
      const data = await res.json();
      const tenants = data.data || [];
      tenants.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = `${t.name} (${t.slug})`;
        document.getElementById('tenant').appendChild(opt);
      });
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = '登录中...';

      const tenantId = document.getElementById('tenant').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // 验证必须选择租户
      if (!tenantId) {
        showError('请选择租户');
        btn.disabled = false;
        btn.textContent = '登录';
        return;
      }

      try {
        const res = await fetch(`${API}/api/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-tenant-id': tenantId },
          body: JSON.stringify({ login: username, password }),
        });
        const data = await res.json();
        const loginData = data.success ? (data.data || {}) : data;

        if (loginData.accessToken) {
          // 优先使用登录响应中的 tenant_id，而不是下拉框选择的
          const actualTenantId = loginData.user?.tenant_id || tenantId;
          localStorage.setItem(STORAGE_KEYS.token, loginData.accessToken || '');
          localStorage.setItem(STORAGE_KEYS.refresh, loginData.refreshToken || '');
          localStorage.setItem(STORAGE_KEYS.tenant, actualTenantId || '');
          localStorage.setItem(STORAGE_KEYS.user, JSON.stringify(loginData.user || {}));
          
          // 同时设置 cookie，供 OAuth 授权流程使用
          // cookie 有效期与 access_token 一致（1小时）
          // 使用 SameSite=None; Secure 以支持跨站 OAuth 流程
          const isSecure = window.location.protocol === 'https:';
          if (isSecure) {
            // HTTPS 环境：使用 SameSite=None; Secure
            document.cookie = `access_token=${loginData.accessToken}; path=/; max-age=3600; SameSite=None; Secure`;
          } else {
            // HTTP 环境（开发）：使用 SameSite=Lax
            document.cookie = `access_token=${loginData.accessToken}; path=/; max-age=3600; SameSite=Lax`;
          }
          
          console.log('[LOGIN] 保存成功, token:', loginData.accessToken?.substring(0, 20) + '...');
          console.log('[LOGIN] tenant:', actualTenantId);

          // 如果有OAuth参数，跳转到授权页面
          if (clientId && redirectUri) {
            const authParams = new URLSearchParams({
              client_id: clientId,
              redirect_uri: redirectUri,
              response_type: 'code'
            });
            if (state) authParams.set('state', state);
            if (scope) authParams.set('scope', scope);
            window.location.href = `/api/auth/authorize?${authParams.toString()}`;
          } else {
            window.location.href = '/dashboard.html';
          }
        } else {
          showError(data.message || '登录失败');
        }
      } catch (err) {
        showError('登录失败，请稍后重试');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function oauth(provider) {
      // 如果有OAuth参数，第三方登录成功后应该跳转回应用
      let callbackUrl = `${API}/api/auth/${provider}`;
      if (clientId && redirectUri) {
        const params = new URLSearchParams({
          client_id: clientId,
          redirect_uri: redirectUri
        });
        if (state) params.set('state', state);
        callbackUrl += `?${params.toString()}`;
      }
      window.location.href = callbackUrl;
    }

    loadTenants();
  </script>
</body>
</html>
